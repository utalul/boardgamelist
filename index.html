<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>龍の應用桌遊推廣軒</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f0e17;
  --surface:#1a1828;
  --surface2:#23213a;
  --accent:#ff6b35;
  --accent2:#f7c948;
  --text:#fffffe;
  --muted:#a7a9be;
  --border:#2e2b4a;
  --card:#1e1c30;
  --radius:12px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Space Mono',monospace;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 60px 0;
}

/* ─── HEADER ─── */
header{
  background:linear-gradient(135deg,#1a1828 0%,#0f0e17 60%,#1e1028 100%);
  border-bottom:2px solid var(--accent);
  padding:28px 32px 20px;
  display:flex;
  align-items:flex-end;
  gap:20px;
  flex-wrap:wrap;
}
header h1{
  font-family:'Noto Serif TC',serif;
  font-weight:900;
  font-size:2rem;
  letter-spacing:.04em;
  color:var(--text);
  line-height:1;
}
header h1 span{color:var(--accent)}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

/* ─── PANEL ─── */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  margin:20px 24px;
}
.panel-title{
  font-family:'Noto Serif TC',serif;
  font-size:.85rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.panel-title::before{content:'';display:inline-block;width:10px;height:2px;background:var(--accent)}

/* ─── IMPORT SECTION ─── */
.import-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:700px){.import-grid{grid-template-columns:1fr}}

.import-box{
  background:var(--surface2);
  border:1.5px dashed var(--border);
  border-radius:10px;
  padding:18px;
  transition:border-color .2s;
}
.import-box:hover{border-color:var(--accent)}
.import-box h3{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}

.import-box label.file-label{
  display:inline-block;
  cursor:pointer;
  background:var(--accent);
  color:#fff;
  font-family:'Space Mono',monospace;
  font-size:.8rem;
  font-weight:700;
  padding:9px 18px;
  border-radius:6px;
  border:none;
  transition:background .2s,transform .1s;
}
.import-box label.file-label:hover{background:#e55a25;transform:translateY(-1px)}

.url-row{display:flex;gap:8px;flex-wrap:wrap}
.url-row input{
  flex:1;
  min-width:0;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Space Mono',monospace;
  font-size:.75rem;
  padding:9px 12px;
  border-radius:6px;
  outline:none;
  transition:border-color .2s;
}
.url-row input:focus{border-color:var(--accent)}
.url-row button{
  background:var(--surface2);
  border:1px solid var(--accent);
  color:var(--accent);
  font-family:'Space Mono',monospace;
  font-size:.75rem;
  font-weight:700;
  padding:9px 14px;
  border-radius:6px;
  cursor:pointer;
  transition:background .2s;
  white-space:nowrap;
}
.url-row button:hover{background:var(--accent);color:#fff}

.notice{
  font-size:11px;
  color:var(--muted);
  margin-top:10px;
  line-height:1.6;
  padding:8px 10px;
  background:rgba(255,107,53,.08);
  border-left:3px solid var(--accent);
  border-radius:0 4px 4px 0;
}
.notice b{color:var(--accent2)}

/* ─── FILTERS ─── */
.filter-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.filter-row input,
.filter-row select{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Space Mono',monospace;
  font-size:.78rem;
  padding:8px 12px;
  border-radius:6px;
  outline:none;
  transition:border-color .2s;
}
.filter-row input:focus,
.filter-row select:focus{border-color:var(--accent)}
.filter-row input{flex:1;min-width:140px}
.filter-row select option{background:var(--surface2)}

.btn{
  background:transparent;
  border:1.5px solid var(--accent2);
  color:var(--accent2);
  font-family:'Space Mono',monospace;
  font-size:.78rem;
  font-weight:700;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.btn:hover{background:var(--accent2);color:var(--bg)}
.btn.primary{border-color:var(--accent);color:var(--accent)}
.btn.primary:hover{background:var(--accent);color:#fff}

/* ─── STATS BAR ─── */
.stats-bar{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  padding:14px 24px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.stat-item{text-align:center}
.stat-value{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:700;color:var(--accent2);line-height:1}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:3px}

/* ─── GAME GRID ─── */
#games{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
  padding:0 24px;
  margin:20px 0;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  cursor:default;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(0,0,0,.5);
  border-color:var(--accent);
}
.card.highlight{border-color:var(--accent2);box-shadow:0 0 0 2px var(--accent2),0 12px 32px rgba(247,201,72,.2)}

.card-img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
  background:var(--surface2);
}
.card-img-placeholder{
  width:100%;
  height:160px;
  background:linear-gradient(135deg,var(--surface2),var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.5rem;
}
.card-body{padding:12px}
.card-name{
  font-family:'Noto Serif TC',serif;
  font-weight:700;
  font-size:.92rem;
  margin-bottom:8px;
  line-height:1.3;
}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.badge{
  font-size:10px;
  padding:2px 7px;
  border-radius:3px;
  font-weight:700;
  letter-spacing:.04em;
}
.badge.cat{background:rgba(100,160,255,.15);color:#7aadff;border:1px solid rgba(100,160,255,.3)}
.badge.status{background:rgba(255,107,53,.12);color:#ff8a5b;border:1px solid rgba(255,107,53,.25)}
.badge.best{background:rgba(76,200,100,.12);color:#6ecc82;border:1px solid rgba(76,200,100,.25)}
.card-meta{font-size:11px;color:var(--muted);line-height:1.8}
.card-img-wrap{position:relative}
.card-tags{
  position:absolute;
  bottom:8px;
  left:6px;
  right:6px;
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  pointer-events:none;
}
.card-tag{
  background:rgba(15,14,23,.75);
  backdrop-filter:blur(4px);
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  padding:3px 10px;
  border-radius:20px;
  border:1.5px solid var(--accent2);
  color:var(--accent2);
}
.card-img{
  width:100%;
  height:180px;
  object-fit:contain;
  display:block;
  background:var(--surface2);
  padding:6px;
}
.card-img-placeholder{
  width:100%;
  height:180px;
  background:linear-gradient(135deg,var(--surface2),var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.5rem;
}
.card-notes{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
  line-height:1.5;
  border-top:1px solid var(--border);
  padding-top:6px;
  font-style:italic;
}
.card-rating{
  display:inline-block;
  background:var(--accent2);
  color:var(--bg);
  font-weight:700;
  font-size:.85rem;
  padding:2px 8px;
  border-radius:4px;
  margin-top:6px;
}

/* ─── CHARTS ─── */
.charts-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin:0 24px 20px;
}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}

.chart-title{
  font-family:'Noto Serif TC',serif;
  font-size:.85rem;
  color:var(--accent2);
  margin-bottom:14px;
  letter-spacing:.06em;
}
.bar-row{margin:6px 0}
.bar-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.bar-track{background:var(--bg);border-radius:3px;height:14px;overflow:hidden}
.bar-fill{
  height:100%;
  border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .6s cubic-bezier(.4,0,.2,1);
  min-width:4px;
}
.bar-fill.cat{background:linear-gradient(90deg,#5b86e5,#36d1c4)}

/* ─── WHEEL ─── */
.wheel-section{text-align:center}
#wheelCanvas{
  border-radius:50%;
  box-shadow:0 0 40px rgba(255,107,53,.2);
  max-width:100%;
}
#wheelResult{
  font-family:'Noto Serif TC',serif;
  font-size:1.3rem;
  font-weight:700;
  color:var(--accent2);
  margin-top:16px;
  min-height:2rem;
}
.spin-btn{
  background:linear-gradient(135deg,var(--accent),#ff8a5b);
  color:#fff;
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:.9rem;
  padding:12px 28px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:16px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 16px rgba(255,107,53,.3);
}
.spin-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,.4)}
.spin-btn:active{transform:translateY(0)}

/* ─── EMPTY STATE ─── */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}
.empty-icon{font-size:4rem;margin-bottom:12px}
.empty p{font-size:.85rem;line-height:1.8}

/* ─── STATUS MSG ─── */
#statusMsg{
  position:fixed;
  bottom:24px;
  right:24px;
  background:var(--surface);
  border:1px solid var(--accent);
  color:var(--text);
  font-size:.8rem;
  padding:10px 18px;
  border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  transform:translateY(80px);
  opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  z-index:999;
  pointer-events:none;
}
#statusMsg.show{transform:translateY(0);opacity:1}
#statusMsg.error{border-color:#e53935;color:#ff6b6b}

</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <h1>龍の應用<span>桌遊推廣軒</span></h1>
    <div class="header-sub">Dragon's Board Game Promotion</div>
  </div>
</header>

<!-- IMPORT PANEL -->
<div class="panel">
  <div class="panel-title">匯入資料</div>
  <div class="import-grid">

    <!-- 方法一：上傳CSV (推薦) -->
    <div class="import-box">
      <h3>📂 方法一：直接上傳 CSV（推薦）</h3>
      <p style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        從 Google 試算表下載 CSV 後直接上傳，最穩定不受網路限制。
      </p>
      <label class="file-label">
        選擇 CSV 檔案
        <input type="file" accept=".csv" style="display:none" onchange="loadCSVFile(event)">
      </label>
      <div class="notice">
        <b>下載方式：</b>在 Google 試算表 → 檔案 → 下載 → 逗號分隔值 (.csv)
      </div>
    </div>

    <!-- 方法二：Google Sheet URL -->
    <div class="import-box">
      <h3>🔗 方法二：Google 試算表網址</h3>
      <p style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        貼上試算表網址，自動載入（需設定公開權限）。
      </p>
      <div class="url-row">
        <input id="sheetUrl" placeholder="貼上 Google Sheet 網址…">
        <button onclick="loadSheet()">載入</button>
      </div>
      <div class="notice">
        <b>必須先設定：</b>試算表 → 共用 → 知道連結的任何人 → <b>「檢視者」</b>
      </div>
    </div>

  </div>
</div>

<!-- FILTER PANEL -->
<div class="panel">
  <div class="panel-title">篩選 &amp; 排序</div>
  <div class="filter-row">
    <input id="search" placeholder="搜尋桌遊名稱…" oninput="renderAll()">

    <select id="players" onchange="renderAll()">
      <option value="">所有玩家數</option>
      <option value="1">1人</option>
      <option value="2">2人</option>
      <option value="3">3人</option>
      <option value="4">4人</option>
      <option value="5">5人</option>
      <option value="6">6人+</option>
    </select>

    <select id="categoryFilter" onchange="renderAll()">
      <option value="">所有分類</option>
    </select>

    <select id="statusFilter" onchange="renderAll()">
      <option value="">所有狀態</option>
      <option>收藏</option>
      <option>想玩</option>
      <option>已玩</option>
    </select>

    <select id="sort" onchange="renderAll()">
      <option value="name">名稱排序</option>
      <option value="rating">評分排序</option>
      <option value="weight">複雜度排序</option>
      <option value="time">時間排序</option>
    </select>

    <button class="btn primary" onclick="randomGame()">🎲 今天玩什麼</button>
    <button class="btn" onclick="exportList()">⬇ 匯出 JSON</button>
    <label class="btn" style="cursor:pointer">
      ⬆ 匯入 JSON
      <input type="file" accept=".json" style="display:none" onchange="importList(event)">
    </label>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item"><div class="stat-value" id="statCount">—</div><div class="stat-label">款桌遊</div></div>
  <div class="stat-item"><div class="stat-value" id="statRating">—</div><div class="stat-label">平均評分</div></div>
  <div class="stat-item"><div class="stat-value" id="statWeight">—</div><div class="stat-label">平均複雜度</div></div>
  <div class="stat-item"><div class="stat-value" id="statCollected">—</div><div class="stat-label">已收藏</div></div>
  <div class="stat-item"><div class="stat-value" id="statPlayed">—</div><div class="stat-label">已玩</div></div>
  <div class="stat-item"><div class="stat-value" id="statWishlist">—</div><div class="stat-label">想玩清單</div></div>
</div>

<!-- GAME GRID -->
<div id="games"></div>

<!-- CHARTS -->
<div class="charts-grid">
  <div class="panel" id="weightChart"></div>
  <div class="panel" id="categoryChart"></div>
</div>

<!-- WHEEL -->
<div class="panel">
  <div class="panel-title">桌遊輪盤</div>
  <div class="wheel-section">
    <canvas id="wheelCanvas" width="360" height="360"></canvas>
    <br>
    <button class="spin-btn" onclick="spinWheel()">🎯 旋轉輪盤</button>
    <div id="wheelResult"></div>
  </div>
</div>

<!-- STATUS MESSAGE -->
<div id="statusMsg"></div>

<script>
let gameData = []
let randomIndex = -1

/* ─── TOAST ─── */
function toast(msg, isError=false){
  const el = document.getElementById('statusMsg')
  el.textContent = msg
  el.className = 'show' + (isError?' error':'')
  clearTimeout(el._t)
  el._t = setTimeout(()=>el.className='', 3200)
}

/* ─── LOCAL STORAGE ─── */
function saveLocal(){
  try{ localStorage.setItem('bg_data', JSON.stringify(gameData)) }catch{}
}
function loadLocal(){
  try{
    const s = localStorage.getItem('bg_data')
    if(s) gameData = JSON.parse(s)
  }catch{}
  renderAll()
}

/* ─── CSV PARSER ─── */
function parseCSV(text){
  const result=[], rows=[]
  let row=[], cur='', inQ=false
  for(let i=0;i<text.length;i++){
    const c=text[i]
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++}else inQ=false }
      else cur+=c
    } else {
      if(c==='"') inQ=true
      else if(c===','){row.push(cur);cur=''}
      else if(c==='\n'||c==='\r'){
        if(c==='\r'&&text[i+1]==='\n')i++
        row.push(cur);result.push(row);row=[];cur=''
      } else cur+=c
    }
  }
  if(cur||row.length){row.push(cur);result.push(row)}
  return result
}

function csvRowsToGames(rows){
  return rows.filter(r=>r[0]&&r[0].trim()).map(r=>({
    name:       (r[0]||'').trim(),
    image:      (r[1]||'').trim(),
    minplayers: parseInt(r[2])||0,
    maxplayers: parseInt(r[3])||0,
    bestplayers:(r[4]||'').trim(),
    playtime:   parseInt(r[5])||0,
    weight:     parseFloat(r[6])||0,
    rating:     parseFloat(r[7])||0,
    category:   (r[8]||'').trim(),
    mechanism:  (r[9]||'').trim(),
    status:     (r[10]||'').trim(),
    notes:      (r[11]||'').trim(),
    tag:        (r[12]||'').trim()
  }))
}

/* ─── 方法一：上傳 CSV 檔案 ─── */
function loadCSVFile(e){
  const file = e.target.files[0]
  if(!file) return
  const reader = new FileReader()
  reader.onload = function(){
    try{
      const rows = parseCSV(reader.result)
      rows.shift() // 移除標題列
      const data = csvRowsToGames(rows)
      if(data.length===0) throw new Error('沒有資料')
      gameData = data
      saveLocal()
      renderAll()
      toast(`✅ 成功載入 ${data.length} 款桌遊！`)
    }catch(err){
      toast('❌ CSV 解析失敗：' + err.message, true)
    }
  }
  reader.onerror = ()=>toast('❌ 檔案讀取失敗', true)
  reader.readAsText(file, 'UTF-8')
  e.target.value = ''
}

/* ─── 方法二：透過 Cloudflare Worker 代理 ─── */
const WORKER_URL = 'https://quiet-fog-9aef.boardgame888888.workers.dev'

async function loadSheet(){
  const input = document.getElementById('sheetUrl').value.trim()
  if(!input){ toast('請先輸入網址', true); return }

  const match = input.match(/\/d\/([a-zA-Z0-9-_]+)/)
  if(!match){ toast('❌ 請貼上正確的 Google 試算表網址', true); return }
  const sheetId = match[1]
  const gidMatch = input.match(/[#&?]gid=(\d+)/)
  const gid = gidMatch ? gidMatch[1] : '0'

  const proxyUrl = `${WORKER_URL}?id=${sheetId}&gid=${gid}`

  toast('⏳ 載入中…')
  try{
    const res = await fetch(proxyUrl)
    if(!res.ok) throw new Error(`HTTP ${res.status}`)
    const text = await res.text()
    const rows = parseCSV(text)
    rows.shift()
    const data = csvRowsToGames(rows)
    if(data.length===0) throw new Error('沒有有效資料列')
    gameData = data
    saveLocal()
    renderAll()
    toast(`✅ 成功載入 ${data.length} 款桌遊！`)
    document.getElementById('sheetUrl').value = ''
  }catch(e){
    console.error(e)
    toast('❌ 載入失敗：' + e.message, true)
  }
}

/* ─── 動態分類選單 ─── */
function renderCategoryFilter(){
  const select = document.getElementById('categoryFilter')
  const current = select.value
  const categories = [...new Set(gameData.map(g=>g.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh'))
  select.innerHTML = '<option value="">所有分類</option>'
  categories.forEach(cat=>{
    const opt = document.createElement('option')
    opt.value = cat
    opt.textContent = cat
    if(cat===current) opt.selected = true
    select.appendChild(opt)
  })
}

/* ─── FILTER ─── */
function getFiltered(){
  const kw  = document.getElementById('search').value.toLowerCase()
  const pl  = document.getElementById('players').value
  const cat = document.getElementById('categoryFilter').value
  const st  = document.getElementById('statusFilter').value
  const so  = document.getElementById('sort').value

  let d = [...gameData]
  if(kw) d = d.filter(g=>g.name.toLowerCase().includes(kw))
  if(pl) d = d.filter(g=>g.maxplayers>=parseInt(pl) && g.minplayers<=parseInt(pl))
  if(cat)d = d.filter(g=>g.category===cat)
  if(st) d = d.filter(g=>g.status===st)
  if(so==='rating') d.sort((a,b)=>b.rating-a.rating)
  if(so==='weight') d.sort((a,b)=>b.weight-a.weight)
  if(so==='time')   d.sort((a,b)=>b.playtime-a.playtime)
  if(so==='name')   d.sort((a,b)=>a.name.localeCompare(b.name,'zh'))
  return d
}

/* ─── RENDER GAMES ─── */
function renderGames(){
  const data = getFiltered()
  const container = document.getElementById('games')
  container.innerHTML = ''

  if(data.length===0){
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">${gameData.length===0?'🎲':'🔍'}</div>
      <p>${gameData.length===0?'還沒有桌遊資料<br>請先從上方匯入資料':'找不到符合條件的桌遊'}</p>
    </div>`
    return
  }

  data.forEach((g,i)=>{
    const card = document.createElement('div')
    card.className = 'card' + (i===randomIndex?' highlight':'')

    // 圖片（用DOM建立，避免引號衝突）
    const imgWrap = document.createElement('div')
    if(g.image){
      const img = document.createElement('img')
      img.className = 'card-img'
      img.alt = g.name
      img.onerror = function(){
        const ph = document.createElement('div')
        ph.className = 'card-img-placeholder'
        ph.textContent = '🎲'
        this.replaceWith(ph)
      }
      img.src = g.image
      imgWrap.appendChild(img)
    } else {
      const ph = document.createElement('div')
      ph.className = 'card-img-placeholder'
      ph.textContent = '🎲'
      imgWrap.appendChild(ph)
    }
    card.appendChild(imgWrap)

    // tag 浮層（疊在圖片上）
    if(g.tag){
      imgWrap.className = 'card-img-wrap'
      const tagsDiv = document.createElement('div')
      tagsDiv.className = 'card-tags'
      g.tag.split(/[,，]/).map(t=>t.trim()).filter(Boolean).forEach(t=>{
        const span = document.createElement('span')
        span.className = 'card-tag'
        span.textContent = t
        tagsDiv.appendChild(span)
      })
      imgWrap.appendChild(tagsDiv)
    }

    // Badge（不含tag）
    let badges = ''
    if(g.category)    badges += `<span class="badge cat">${g.category}</span>`
    if(g.status)      badges += `<span class="badge status">${g.status}</span>`
    if(g.bestplayers) badges += `<span class="badge best">最佳${g.bestplayers}人</span>`

    const notesEl = g.notes ? `<div class="card-notes">📝 ${g.notes}</div>` : ''

    const body = document.createElement('div')
    body.className = 'card-body'
    body.innerHTML = `
      <div class="card-name">${g.name}</div>
      <div class="badges">${badges}</div>
      <div class="card-meta">
        👥 ${g.minplayers}–${g.maxplayers} 人<br>
        ⏱ ${g.playtime} 分鐘<br>
        🧠 複雜度 ${g.weight}
      </div>
      <span class="card-rating">⭐ ${g.rating}</span>
      ${notesEl}`
    card.appendChild(body)
    container.appendChild(card)
  })
}

/* ─── RENDER STATS ─── */
function renderStats(){
  const bar = document.getElementById('statsBar')
  if(gameData.length===0){ bar.style.display='none'; return }
  bar.style.display='flex'
  const d = getFiltered()
  document.getElementById('statCount').textContent = d.length
  document.getElementById('statRating').textContent = d.length ? (d.reduce((a,b)=>a+b.rating,0)/d.length).toFixed(1) : '—'
  document.getElementById('statWeight').textContent = d.length ? (d.reduce((a,b)=>a+b.weight,0)/d.length).toFixed(1) : '—'
  document.getElementById('statCollected').textContent = d.filter(g=>g.status==='收藏').length
  document.getElementById('statPlayed').textContent    = d.filter(g=>g.status==='已玩').length
  document.getElementById('statWishlist').textContent  = d.filter(g=>g.status==='想玩').length
}

/* ─── RENDER WEIGHT CHART ─── */
function renderWeightChart(){
  const labels=['輕量 <1.5','中輕 1.5–2.5','中度 2.5–3.5','中重 3.5–4.5','重策 4.5+']
  const buckets=[0,0,0,0,0]
  gameData.forEach(g=>{
    if(g.weight<1.5)     buckets[0]++
    else if(g.weight<2.5)buckets[1]++
    else if(g.weight<3.5)buckets[2]++
    else if(g.weight<4.5)buckets[3]++
    else                 buckets[4]++
  })
  const max = Math.max(...buckets,1)
  const el = document.getElementById('weightChart')
  el.innerHTML = '<div class="chart-title">複雜度分布</div>'
  buckets.forEach((v,i)=>{
    el.innerHTML += `<div class="bar-row">
      <div class="bar-label">${labels[i]} <span style="color:var(--accent2);font-weight:700">${v}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div>
    </div>`
  })
}

/* ─── RENDER CATEGORY CHART ─── */
function renderCategoryChart(){
  const map={}
  gameData.forEach(g=>{ if(g.category){ map[g.category]=(map[g.category]||0)+1 } })
  const max = Math.max(...Object.values(map),1)
  const el = document.getElementById('categoryChart')
  el.innerHTML = '<div class="chart-title">分類統計</div>'
  Object.entries(map).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    el.innerHTML += `<div class="bar-row">
      <div class="bar-label">${k} <span style="color:var(--accent2);font-weight:700">${v}</span></div>
      <div class="bar-track"><div class="bar-fill cat" style="width:${(v/max*100).toFixed(1)}%"></div></div>
    </div>`
  })
}

function renderAll(){
  renderCategoryFilter()
  renderGames()
  renderStats()
  renderWeightChart()
  renderCategoryChart()
  drawWheel()
}

/* ─── RANDOM GAME ─── */
function randomGame(){
  const filtered = getFiltered()
  if(!filtered.length){ toast('目前篩選條件下沒有桌遊可抽選', true); return }
  const pick = filtered[Math.floor(Math.random()*filtered.length)]
  // 找出在filtered中的index對應到renderGames的位置
  randomIndex = filtered.indexOf(pick)
  renderGames()
  document.querySelector('.card.highlight')?.scrollIntoView({behavior:'smooth',block:'center'})
  toast(`🎲 今天玩：${pick.name}`)
}

/* ─── WHEEL ─── */
let wheelAngle = 0
let isSpinning = false

const COLORS = [
  ['#ff6b35','#fff'],['#f7c948','#1a1828'],
  ['#5b86e5','#fff'],['#36d1c4','#1a1828'],
  ['#e056a0','#fff'],['#4cbc68','#fff']
]

function drawWheel(){
  const canvas = document.getElementById('wheelCanvas')
  const ctx = canvas.getContext('2d')
  const cx=180, cy=180, r=170
  ctx.clearRect(0,0,360,360)

  const filtered = getFiltered()

  if(!filtered.length){
    ctx.fillStyle='#1e1c30'
    ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI); ctx.fill()
    ctx.fillStyle='#a7a9be'
    ctx.font='14px Space Mono,monospace'
    ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText(gameData.length===0?'載入資料後':'無符合條件', cx, cy-10)
    ctx.fillText(gameData.length===0?'輪盤將出現':'的桌遊', cx, cy+10)
    return
  }

  const slice = 2*Math.PI/filtered.length
  for(let i=0;i<filtered.length;i++){
    const [bg,fg] = COLORS[i%COLORS.length]
    ctx.beginPath()
    ctx.moveTo(cx,cy)
    ctx.arc(cx,cy,r, wheelAngle+i*slice, wheelAngle+(i+1)*slice)
    ctx.fillStyle=bg; ctx.fill()
    ctx.strokeStyle='#0f0e17'; ctx.lineWidth=1.5; ctx.stroke()

    ctx.save()
    ctx.translate(cx,cy)
    ctx.rotate(wheelAngle+i*slice+slice/2)
    ctx.fillStyle=fg
    ctx.font=`bold ${filtered.length>10?10:13}px Noto Serif TC,serif`
    ctx.textBaseline='middle'
    ctx.fillText(filtered[i].name.substring(0,10), r*0.45, 0)
    ctx.restore()
  }
  // 指針
  ctx.beginPath()
  ctx.moveTo(360-8,cy); ctx.lineTo(360-28,cy-12); ctx.lineTo(360-28,cy+12)
  ctx.fillStyle='#ff6b35'; ctx.fill()
  // 中心點
  ctx.beginPath(); ctx.arc(cx,cy,12,0,2*Math.PI)
  ctx.fillStyle='#0f0e17'; ctx.fill()
  ctx.strokeStyle='#ff6b35'; ctx.lineWidth=2; ctx.stroke()
}

function spinWheel(){
  const filtered = getFiltered()
  if(!filtered.length||isSpinning) return
  isSpinning=true
  document.getElementById('wheelResult').textContent=''
  const totalSteps = 60+Math.floor(Math.random()*40)
  const slice = 2*Math.PI/filtered.length
  let step=0

  const timer=setInterval(()=>{
    const t=step/totalSteps
    const speed = 0.3*Math.pow(1-t,1.5)+0.04
    wheelAngle+=speed; step++
    drawWheel()
    if(step>=totalSteps){
      clearInterval(timer); isSpinning=false
      const filtered2 = getFiltered()
      let na = ((2*Math.PI)-(wheelAngle%(2*Math.PI))) % (2*Math.PI)
      const idx = Math.floor(na/slice)%filtered2.length
      document.getElementById('wheelResult').textContent = '🎉 今天玩：'+filtered2[idx].name
    }
  },30)
}

/* ─── EXPORT / IMPORT JSON ─── */
function exportList(){
  if(!gameData.length){toast('沒有資料可匯出',true);return}
  const blob=new Blob([JSON.stringify(gameData,null,2)],{type:'application/json'})
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob)
  a.download='boardgames.json'; a.click()
}
function importList(e){
  const file=e.target.files[0]; if(!file)return
  const reader=new FileReader()
  reader.onload=function(){
    try{
      gameData=JSON.parse(reader.result)
      saveLocal(); renderAll()
      toast(`✅ 匯入成功，共 ${gameData.length} 款`)
    }catch{ toast('❌ JSON 格式錯誤',true) }
  }
  reader.readAsText(file)
  e.target.value=''
}

/* ─── 自動載入試算表 ─── */
const AUTO_SHEET_ID = '1BPez5r4NN3X47L0G54cCUeRxQQiNxpSZXs-9YiT8HK0'

async function autoLoadSheet(){
  toast('⏳ 載入桌遊清單中…')
  const proxyUrl = `${WORKER_URL}?id=${AUTO_SHEET_ID}&gid=0`
  try{
    const res = await fetch(proxyUrl)
    const text = await res.text()
    // 檢查是否被導向到登入頁（Google有時會回傳HTML）
    if(text.trim().startsWith('<')) throw new Error('試算表未設定公開權限，請設為「知道連結的任何人可檢視」')
    if(!res.ok) throw new Error(`伺服器回應錯誤 HTTP ${res.status}`)
    const rows = parseCSV(text)
    if(rows.length<=1) throw new Error('試算表沒有資料列')
    rows.shift()
    const data = csvRowsToGames(rows)
    if(data.length===0) throw new Error('解析後沒有有效資料')
    gameData = data
    saveLocal()
    renderAll()
    toast(`✅ 已載入 ${data.length} 款桌遊`)
  }catch(e){
    console.error('自動載入失敗:', e)
    toast(`⚠️ ${e.message}`, true)
    loadLocal()
  }
}

/* ─── INIT ─── */
autoLoadSheet()
